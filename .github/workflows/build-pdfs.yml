name: Build PDFs

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/*.js'
      - '**/*.jsx'
      - 'docs/**/*.md'
      - 'docs/**/*.tex'
      - 'scripts/build_submission_tex.py'
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TeX Live
        run: sudo apt-get update && sudo apt-get install -y texlive-luatex texlive-fonts-recommended texlive-latex-extra texlive-fonts-extra

      - name: Build Submission TEX and PDF
        run: python3 scripts/build_submission_tex.py

      - name: Build Technical PDF
        run: |
          cd docs
          lualatex -interaction=nonstopmode TECHNICAL.tex || true
          lualatex -interaction=nonstopmode TECHNICAL.tex || true

      - name: Commit and Push PDFs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf docs/*.tex
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-compile LaTeX PDFs [skip ci]" && git push)
