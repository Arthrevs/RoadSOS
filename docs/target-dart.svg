<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#82eefd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Concentric Target Circles -->
    <circle cx="12" cy="12" r="10" />
    <circle cx="12" cy="12" r="6" />
    <circle cx="12" cy="12" r="2" />
    
    <!-- Solid Dart to prevent lines mixing with the board -->
    <!-- Dart Shaft -->
    <line x1="14" y1="10" x2="22" y2="2" stroke="#ef4444" stroke-width="2" />
    <!-- Pointed Tip (Filled Triangle) -->
    <polygon points="12 12 13 9 15 11" fill="#ef4444" stroke="#ef4444" stroke-linejoin="round" />
</svg>
