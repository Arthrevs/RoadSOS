<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Offline Signal Centered with Diagonal Slash -->
    <g>
        <!-- Faded Signal Waves (Increased width by 40%, safely inside frame) -->
        <path d="M 5 3.5 Q 9 1 13 3.5" stroke-opacity="0.4" />
        <path d="M 7 5.5 Q 9 4 11 5.5" stroke-opacity="0.4" />
        <circle cx="9" cy="7.5" r="0.5" fill="#3b82f6" stroke="none" opacity="0.4" />
        <!-- Red Offline Slash (Exactly 50% of the 1.5 standard thickness = 0.75) -->
        <line x1="13" y1="2.5" x2="6.5" y2="7.5" stroke="#ef4444" stroke-width="0.75" />
    </g>
    
    <!-- 4 Server Layers (Increased thickness/height, perfectly equal) -->
    <rect x="3" y="8.5" width="12" height="3" rx="0.5" />
    <rect x="3" y="12.5" width="12" height="3" rx="0.5" />
    <rect x="3" y="16.5" width="12" height="3" rx="0.5" />
    <rect x="3" y="20.5" width="12" height="3" rx="0.5" />
    
    <!-- Cascading Fallback Arrows -->
    <g stroke-width="1">
        <path d="M 15 10 C 19.5 10, 19.5 14, 17 14" fill="none" />
        <polygon points="14.5,14 17.5,13 17.5,15" fill="#3b82f6" stroke="none" />
        
        <path d="M 17 14 C 19.5 14, 19.5 18, 17 18" fill="none" />
        <polygon points="14.5,18 17.5,17 17.5,19" fill="#3b82f6" stroke="none" />
        
        <path d="M 17 18 C 19.5 18, 19.5 22, 17 22" fill="none" />
        <polygon points="14.5,22 17.5,21 17.5,23" fill="#3b82f6" stroke="none" />
    </g>
</svg>
